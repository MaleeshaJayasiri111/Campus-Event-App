<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Event Admin</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="CampusEventAdmin.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
</head>
<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyCg_7N1gy3KouJkCIYTqhRfNNs-nio3aAM",
            authDomain: "campuseventapp-45145.firebaseapp.com",
            projectId: "campuseventapp-45145",
            storageBucket: "campuseventapp-45145.firebasestorage.app",
            messagingSenderId: "68712165143",
            appId: "1:68712165143:web:cc6befc94a1157ff1b1152",
            measurementId: "G-8V8N8593QP"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        window.firebaseAuth = {
            signIn: async function (email, password) {
                try {
                    const result = await auth.signInWithEmailAndPassword(email, password);
                    return { success: true, token: await result.user.getIdToken() };
                } catch (error) {
                    return { success: false, Error: error.message };
                }
            },
            getUser: async function () {
                return new Promise((resolve) => {
                    const unsubscribe = auth.onAuthStateChanged(user => {
                        unsubscribe();
                        resolve(user ? { email: user.email } : null);
                    });
                });
            },
            signOut: async function () {
                try {
                    await firebase.auth().signOut();
                    return true;
                } catch (error) {
                    console.error("Logout Error:", error);
                    return false;
                }
            }
        };

        window.firebaseInterop = {
            SaveEvent: async function (eventData) {
                try {
                    const docRef = db.collection('events').doc();
                    eventData.id = docRef.id;
                    await docRef.set(eventData);
                    return true;
                } catch (error) { return false; }
            },
            UpdateEvent: async function (id, eventData) {
                try {
                    eventData.id = id;
                    await db.collection('events').doc(id).set(eventData);
                    return true;
                } catch (error) { return false; }
            },
            GetEvents: async function () {
                try {
                    const snapshot = await db.collection('events').get();
                    const events = [];
                    snapshot.forEach(doc => { events.push({ ...doc.data(), id: doc.id }); });
                    return events;
                } catch (error) { return []; }
            },

            DeleteEvent: async function (id) {
                try {
                    await db.collection("events").doc(id).delete();
                } catch (error) {
                    console.error("Error deleting document: ", error);
                    throw error;
                }
            },

            GetFeedbacks: async function () {
                try {
                    const querySnapshot = await db.collection("feedbacks").get();
                    const feedbacks = [];
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        feedbacks.push({
                            id: doc.id,
                            eventId: data.eventId || "",
                            eventTitle: data.eventTitle || "Unknown Event", 
                            submittedBy: data.submittedBy || "",
                            email: data.email || "",
                            comment: data.comment || "",
                            rating: data.rating || 5
                        });
                    });
                    return feedbacks;
                } catch (error) {
                    return [];
                }
            },

        GetUsers: async function () {
            try {
                const snapshot = await db.collection('registrations').get(); 
                const usrs = [];
                snapshot.forEach(doc => { usrs.push({ ...doc.data(), id: doc.id }); });
                return usrs;
            } catch (error) { return []; }
          }
        };

    </script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>
</html>
